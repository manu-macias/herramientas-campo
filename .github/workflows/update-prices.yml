name: Actualizar precios desde BCR y Dólar Oficial

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 9am Argentina (UTC-3), lunes a viernes
  workflow_dispatch:          # permite correrlo manualmente

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Obtener precios
        run: |
          python3 << 'PYEOF'
          import urllib.request, re, json, datetime

          # --- Soja desde BCR ---
          url_bcr = "https://www.cac.bcr.com.ar/es/precios-de-pizarra"
          req = urllib.request.Request(url_bcr, headers={"User-Agent": "Mozilla/5.0"})
          html = urllib.request.urlopen(req, timeout=15).read().decode("utf-8")

          m = re.search(r'board-soja.*?<div class="price">\s*\$([\d.,]+)', html, re.DOTALL)
          if not m:
              raise ValueError("No se encontro el precio de soja en BCR")
          soja = int(m.group(1).replace(".", "").split(",")[0])

          # --- Dólar Oficial desde dolarapi.com (misma fuente que dolarhoy.com) ---
          url_dolar = "https://dolarapi.com/v1/dolares/oficial"
          req2 = urllib.request.Request(url_dolar, headers={"User-Agent": "Mozilla/5.0"})
          dolar_data = json.loads(urllib.request.urlopen(req2, timeout=15).read().decode("utf-8"))
          dolar = int(dolar_data["venta"])

          data = {
              "soja": soja,
              "dolar": dolar,
              "fecha": datetime.date.today().isoformat(),
              "fuentes": {
                  "soja": "https://www.cac.bcr.com.ar/es/precios-de-pizarra",
                  "dolar": "https://dolarapi.com/v1/dolares/oficial (Dólar Oficial BCRA)"
              }
          }

          with open("prices.json", "w") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print(f"Soja: ${soja:,} | Dolar oficial (venta): ${dolar:,}")
          PYEOF

      - name: Commit prices.json si cambio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || (git commit -m "chore: precios $(date +'%Y-%m-%d') - soja BCR + dolar oficial" && git push)
