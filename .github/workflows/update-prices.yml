name: Actualizar precios desde BCR y Dólar Oficial

on:
  schedule:
    - cron: '30 21 * * 1-5'  # 18:30 Argentina (UTC-3), lunes a viernes — pizarra ya publicada
  workflow_dispatch:          # permite correrlo manualmente

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Obtener precios (acumula serie diaria en prices.json)
        run: python3 scripts/update_prices.py

      - name: Commit prices.json si cambio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || (git commit -m "chore: precios $(date +'%Y-%m-%d') - soja BCR + dolar oficial" && git push)
