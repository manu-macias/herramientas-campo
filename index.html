    input[type=range] { width: 100%; accent-color: #A6D63F; cursor: pointer; height: 6px; }

<body>
<div id="root"></div>
<script>
const { useState, useEffect, useRef, createElement: h } = React;

// ===== Design tokens — paleta "Tierra & lima" =====
const T = {
  bg:"#100F0A", segBg:"#16140D", surface:"#1A1813", surface2:"#211E17",
  border:"#2E2A20", borderStrong:"#3A3527",
  text:"#F5F2EA", text2:"#B9B1A0", text3:"#8A8270", faint:"#6A6354",
  soja:"#A6D63F", sojaDim:"#86AE32", dolar:"#E8A92C", score:"#5FB39A", red:"#E8705A",
  sojaBg:"rgba(166,214,63,0.10)",  sojaBorder:"rgba(166,214,63,0.34)",
  dolarBg:"rgba(232,169,44,0.10)", dolarBorder:"rgba(232,169,44,0.34)",
  scoreBg:"rgba(95,179,154,0.10)", scoreBorder:"rgba(95,179,154,0.32)",
  redBg:"rgba(232,112,90,0.12)",   redBorder:"rgba(232,112,90,0.34)",
  r:14, rs:10,
};
const tint = {
  soja:    { bg:T.sojaBg,  border:T.sojaBorder,  fg:T.soja,  icon:"trending-up" },
  dolares: { bg:T.dolarBg, border:T.dolarBorder, fg:T.dolar, icon:"currency-dollar" },
  neutro:  { bg:T.scoreBg, border:T.scoreBorder, fg:T.score, icon:"scale" },
};
const CMAP  = { green:T.soja, red:T.red, yellow:T.dolar, blue:T.score, gray:T.text3 };
const CICON = { green:"circle-check", red:"alert-triangle", yellow:"alert-triangle", blue:"info-circle", gray:"clock" };

const ic = (name, size, color) => h("i", { className:"ti ti-"+name, "aria-hidden":"true", style:{ fontSize:(size||16)+"px", color:color||"inherit", lineHeight:1, display:"inline-flex" } });
const stepBtn = (name, onClick) => h("button", { type:"button", onClick, "aria-label": name==="plus"?"sumar":"restar",
  style:{ width:32, height:32, flexShrink:0, borderRadius:9, background:T.surface2, border:`1px solid ${T.borderStrong}`, color:T.text2, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" } }, ic(name, 16));

const PASS_HASH = "7dca3a2295651cd47867174d10fd26f1c0f6b0bc09393552309c4c9a5fdbee94";

async function hashStr(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

function Login({ onSuccess }) {
  const [pwd, setPwd] = useState("");
  const [error, setError] = useState(false);
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    setLoading(true);
    const h2 = await hashStr(pwd);
    if (h2 === PASS_HASH) {
      sessionStorage.setItem("auth", "1");
      // Guardamos la contraseña en la sesión (per-tab) para autorizar escrituras.
      // El Apps Script la valida server-side; en el código público solo está su hash.
      sessionStorage.setItem("pw", pwd);
      onSuccess();
    } else {
      setError(true);
      setLoading(false);
      setPwd("");
    }
  };

  return h("div", { style:{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", padding:24 } },
    h("div", { style:{ width:56, height:56, borderRadius:16, background:T.sojaBg, border:`1px solid ${T.sojaBorder}`, display:"flex", alignItems:"center", justifyContent:"center", marginBottom:18 } }, ic("plant-2", 30, T.soja)),
    h("div", { style:{ fontSize:20, fontWeight:700, color:T.text, marginBottom:4 } }, "Soja vs Dólar"),
    h("div", { style:{ fontSize:12.5, color:T.text3, marginBottom:30 } }, "Herramientas de campo · acceso familiar"),
    h("div", { style:{ width:"100%", maxWidth:320 } },
      h("div", { style:{ fontSize:12, fontWeight:500, color:T.text3, marginBottom:8 } }, "Contraseña"),
      h("input", {
        type:"password", value:pwd, placeholder:"Ingresá la contraseña",
        onChange: e => { setPwd(e.target.value); setError(false); },
        onKeyDown: e => e.key === "Enter" && submit(),
        style:{ width:"100%", padding:"13px 14px", background:T.surface, border:`1px solid ${error?T.red:T.border}`, borderRadius:T.rs, color:T.text, fontSize:15, fontFamily:"inherit", outline:"none", marginBottom:8 }
      }),
      error && h("div", { style:{ fontSize:12, color:T.red, marginBottom:8 } }, "Contraseña incorrecta"),
      h("button", {
        onClick: submit, disabled: loading || !pwd,
        style:{ width:"100%", padding:13, background: pwd ? T.soja : T.surface2, border:"none", borderRadius:T.rs, color: pwd ? T.bg : T.faint, fontSize:14.5, fontWeight:700, cursor: pwd ? "pointer" : "default" }
      }, loading ? "Verificando…" : "Entrar")
    )
  );
}

const FMT = (n) => Number(n).toLocaleString("es-AR", { maximumFractionDigits: 0 });
const PCT = (v) => (v >= 0 ? "+" : "") + (v * 100).toFixed(1) + "%";

const DEFAULTS = {
  soja_hoy: 465000, dolar_hoy: 1478,
  soja_prom: 440000, dolar_prom: 1430,
  stock_d: 3, stock_s: 3, urgencia: 3, expect_s: 3,
  tn_soja: 50, usd_dolar: 10000,
};

const TABS = [
  { icon:"target-arrow",           label:"Decisión" },
  { icon:"calendar-stats",         label:"Historial" },
  { icon:"adjustments-horizontal", label:"Mi situación" },
];

const API_URL = "https://script.google.com/macros/s/AKfycbwsdAE_vLrAHUQ_Ls1FE0zhaJxZVTdJfobl5YsFMOZulgDotLMPRL1-Cx-AQ-jb4eDp/exec?token=campo-soja-2026";
const MESES_CAMP = ["JUN","JUL","AGO","SEP","OCT","NOV","DIC","ENE","FEB","MAR","ABR","MAY"];

function calcScore(v) {
  const { soja_hoy, dolar_hoy, soja_prom, dolar_prom, stock_d, stock_s, urgencia, expect_s } = v;
  if (!soja_hoy || !dolar_hoy || !soja_prom || !dolar_prom) return { score: 0, soja_rel: 0, dolar_rel: 0, razones: [] };
  const soja_rel  = (soja_hoy  - soja_prom)  / soja_prom;
  const dolar_rel = (dolar_hoy - dolar_prom) / dolar_prom;
  let score = 0; const razones = [];
  score += soja_rel * 3.5;
  if (soja_rel > 0.02)       razones.push({ c:"green", t:`Soja ${PCT(soja_rel)} sobre su promedio`, d:"buen momento para liquidar" });
  else if (soja_rel < -0.02) razones.push({ c:"red",   t:`Soja ${PCT(soja_rel)} bajo su promedio`,  d:"conviene guardarla" });
  score -= dolar_rel * 2.5;
  if (dolar_rel > 0.02)       razones.push({ c:"green", t:`Dólar ${PCT(dolar_rel)} sobre su promedio`, d:"buen momento para vender dólares" });
  else if (dolar_rel < -0.02) razones.push({ c:"red",   t:`Dólar ${PCT(dolar_rel)} bajo su promedio`,  d:"guardá los dólares" });
  score -= (stock_d - 3) * 0.35;
  if (stock_d >= 4) razones.push({ c:"blue",   t:"Buen stock de dólares", d:"podés vender sin quedar descubierto" });
  if (stock_d <= 2) razones.push({ c:"yellow", t:"Poco stock de dólares", d:"cuidado con vender muchos" });
  score += (stock_s - 3) * 0.25;
  if (stock_s >= 4) razones.push({ c:"green",  t:"Mucha soja en stock", d:"podés vender sin apuro" });
  score -= (expect_s - 3) * 0.6;
  if (expect_s >= 4) razones.push({ c:"blue",   t:"Esperás que suba la soja", d:"guardala y vendé dólares ahora" });
  if (expect_s <= 2) razones.push({ c:"yellow", t:"Esperás que baje la soja", d:"mejor vender ahora que después" });
  if (urgencia >= 4) razones.push({ c:"gray",   t:"Alta urgencia de pesos", d:"actuá rápido con lo que esté mejor" });
  return { score, soja_rel, dolar_rel, razones };
}

function SecLabel({ children }) {
  return h("div", { style:{ fontSize:12, fontWeight:600, color:T.text3, margin:"18px 2px 9px" } }, children);
}

function Slider({ label, value, onChange, hint }) {
  return h("div", { style:{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:T.rs, padding:"13px 14px" } },
    h("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:13, fontWeight:500, color:T.text2, marginBottom:10 } },
      h("span", null, label), h("span", { style:{ color:T.soja, fontWeight:700, fontSize:16 } }, value)
    ),
    h("input", { type:"range", min:1, max:5, value, onChange: e => onChange(Number(e.target.value)) }),
    h("div", { style:{ fontSize:11.5, color:T.faint, marginTop:7 } }, hint)
  );
}

function NumInput({ label, value, onChange, unit, step, icon, accent }) {
  const st = step || 1000;
  return h("div", { style:{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:T.rs, padding:"13px 14px" } },
    h("div", { style:{ display:"flex", alignItems:"center", gap:7, fontSize:12.5, fontWeight:500, color:T.text3, marginBottom:7 } },
      icon ? ic(icon, 15, accent || T.text3) : null, h("span", null, label)
    ),
    h("div", { style:{ display:"flex", alignItems:"center", gap:8 } },
      h("input", { type:"number", value, step:st, onChange: e => onChange(Number(e.target.value)),
        style:{ flex:1, minWidth:0, background:"transparent", border:"none", outline:"none", color:T.text, fontSize:21, fontWeight:700, fontFamily:"inherit" } }),
      h("div", { style:{ display:"flex", gap:6 } },
        stepBtn("minus", () => onChange(Number((value - st).toFixed(2)))),
        stepBtn("plus",  () => onChange(Number((value + st).toFixed(2))))
      )
    ),
    h("div", { style:{ fontSize:11.5, color:T.faint, marginTop:4 } }, unit)
  );
}

function PriceChart({ precios }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !precios || precios.length < 2) return;
    if (chartRef.current) chartRef.current.destroy();

    const daily  = precios.some(p => p.fecha);
    const labels = precios.map(p => p.fecha ? p.fecha.slice(8,10) + "/" + p.fecha.slice(5,7) : p.mes);
    const sojas  = precios.map(p => p.soja);
    const dolars = precios.map(p => p.dolar);
    const last   = precios.length - 1;
    const lastSoja = sojas.reduce((acc, v, i) => v != null ? i : acc, -1);

    chartRef.current = new Chart(canvasRef.current, {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            label: "Soja $/tn", data: sojas, yAxisID: "ySoja",
            borderColor: T.soja, backgroundColor: "rgba(166,214,63,0.09)", borderWidth: 2.5,
            pointRadius: sojas.map((_, i) => i === lastSoja ? 5 : (daily ? 0 : 3)),
            pointBackgroundColor: sojas.map((_, i) => i === lastSoja ? T.soja : "rgba(166,214,63,0.5)"),
            pointBorderColor: "transparent", tension: daily ? 0.1 : 0.35, spanGaps: true, fill: !daily,
          },
          {
            label: "Dólar Oficial $/USD", data: dolars, yAxisID: "yDolar",
            borderColor: T.dolar, backgroundColor: "rgba(232,169,44,0.06)", borderWidth: 2.5,
            pointRadius: dolars.map((_, i) => i === last ? 5 : (daily ? 0 : 3)),
            pointBackgroundColor: dolars.map((_, i) => i === last ? T.dolar : "rgba(232,169,44,0.5)"),
            pointBorderColor: "transparent", tension: daily ? 0.1 : 0.35, spanGaps: true, fill: !daily,
          },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: true, interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { labels: { color: T.text2, font: { size: 11, family:"Inter" }, boxWidth: 12, padding: 16 } },
          tooltip: {
            backgroundColor: T.surface2, borderColor: T.border, borderWidth: 1,
            titleColor: T.text, bodyColor: T.text2, padding: 10,
            titleFont:{ family:"Inter" }, bodyFont:{ family:"Inter" },
            callbacks: { label: ctx => "  " + ctx.dataset.label + ": $" + Number(ctx.parsed.y).toLocaleString("es-AR") },
          },
        },
        scales: {
          x: { ticks: { color: T.faint, font: { size: 10, family:"Inter" }, maxRotation: 45, autoSkip: true, maxTicksLimit: 10 }, grid: { color: "rgba(46,42,32,0.7)" } },
          ySoja:  { position: "left",  ticks: { color: T.soja,  font: { size: 10, family:"Inter" }, callback: v => "$" + (v/1000).toFixed(0) + "k" }, grid: { color: "rgba(46,42,32,0.7)" } },
          yDolar: { position: "right", ticks: { color: T.dolar, font: { size: 10, family:"Inter" }, callback: v => "$" + (v/1000).toFixed(1) + "k" }, grid: { drawOnChartArea: false } },
        },
      },
    });

    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [precios]);

  return h("div", { style:{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:T.r, padding:"16px 13px", marginBottom:14 } },
    h("div", { style:{ display:"flex", alignItems:"center", gap:8, fontSize:12.5, fontWeight:600, color:T.text2, marginBottom:13 } },
      ic("chart-line", 16, T.soja), h("span", null, "Evolución diaria"),
      h("span", { style:{ fontSize:11, fontWeight:400, color:T.faint } }, "· pasá el dedo para ver valores")
    ),
    h("canvas", { ref: canvasRef, style:{ maxHeight: 260 } })
  );
}

function App() {
  const [auth, setAuth]       = useState(() => sessionStorage.getItem("auth") === "1");
  const [tab, setTab]         = useState(0);
  const [v, setV]             = useState(DEFAULTS);
  const [hist, setHist]       = useState(() => {
    try { return JSON.parse(localStorage.getItem("soja_hist_v3") || "[]"); } catch { return []; }
  });
  const [hForm, setHForm]     = useState({ mes:"", soja:"", dolar:"", decision:"soja" });
  const [histSub, setHistSub] = useState(0);
  const [apiData, setApiData] = useState(null);
  const [apiLoad, setApiLoad] = useState(false);
  const [apiErr,  setApiErr]  = useState(null);
  const [priceHist, setPriceHist] = useState([]);
  const [vForm, setVForm]   = useState({ socio:"", mes:"", tn:"" });
  const [vSaving, setVSaving] = useState(false);
  const [vMsg, setVMsg]     = useState(null);

  const logout = () => { sessionStorage.removeItem("auth"); sessionStorage.removeItem("pw"); setAuth(false); };

  // Lee el valor actual de una celda socio×mes desde los datos de la API.
  const cellVenta = (data, socio, mes) => {
    if (!data || !data.ventas) return 0;
    const row = data.ventas.find(r => r.nombre === socio);
    const mi  = MESES_CAMP.indexOf(mes);
    return row && mi >= 0 ? (Number(row.ventas[mi]) || 0) : 0;
  };

  const registrarVenta = async () => {
    const tn = Number(vForm.tn);
    if (!vForm.socio || !vForm.mes || !tn || tn <= 0) {
      setVMsg({ ok:false, txt:"Completá socio, mes y toneladas (> 0)." });
      return;
    }
    const before = cellVenta(apiData, vForm.socio, vForm.mes);
    setVSaving(true); setVMsg(null);
    try {
      // Apps Script no permite LEER respuestas POST cross-origin (CORS). Por eso
      // posteamos en modo no-cors (la contraseña viaja en el body, no en la URL)
      // y confirmamos releyendo la planilla por GET, comparando antes/después.
      await fetch(API_URL, {
        method: "POST", mode: "no-cors", redirect: "follow",
        body: JSON.stringify({
          op: "registrar_venta",
          secret: sessionStorage.getItem("pw") || "",
          socio: vForm.socio, mes: vForm.mes, tn,
        }),
      });
      // Releemos hasta 3 veces (la escritura puede tardar en propagarse).
      let fresh = apiData, after = before;
      for (let i = 0; i < 3 && !(after > before + 0.001); i++) {
        await new Promise(r => setTimeout(r, i === 0 ? 500 : 700));
        fresh = await fetch(API_URL + "&_=" + Date.now()).then(r => r.json());
        after = cellVenta(fresh, vForm.socio, vForm.mes);
      }
      setApiData(fresh);
      if (after > before + 0.001) {
        setVMsg({ ok:true, txt:`Registradas ${tn} tn de ${vForm.socio} en ${vForm.mes}.` });
        setVForm({ socio:"", mes:"", tn:"" });
      } else {
        setVMsg({ ok:false, txt:"No se registró. Verificá la contraseña: cerrá sesión y volvé a entrar." });
      }
    } catch (e) {
      setVMsg({ ok:false, txt:"No se pudo registrar: " + e.message });
    } finally {
      setVSaving(false);
    }
  };

  useEffect(() => {
    fetch("prices.json?t=" + Date.now())
      .then(r => r.json())
      .then(d => {
        setV(prev => ({
          ...prev,
          ...(d.soja  ? { soja_hoy:  d.soja  } : {}),
          ...(d.dolar ? { dolar_hoy: d.dolar } : {}),
        }));
        if (Array.isArray(d.history)) setPriceHist(d.history);
      })
      .catch(() => {});
  }, []);

  useEffect(() => {
    if (!auth) return;
    setApiLoad(true);
    fetch(API_URL)
      .then(r => r.json())
      .then(d => { setApiData(d); setApiLoad(false); })
      .catch(() => { setApiErr("No se pudo cargar la planilla."); setApiLoad(false); });
  }, [auth]);

  if (!auth) return h(Login, { onSuccess: () => setAuth(true) });

  const set = (k) => (val) => setV(prev => ({ ...prev, [k]: val }));
  const saveHist = (arr) => { setHist(arr); try { localStorage.setItem("soja_hist_v3", JSON.stringify(arr)); } catch {} };

  const { score, soja_rel, dolar_rel, razones } = calcScore(v);
  const claro = Math.abs(score) > 1.2;
  let verdict = { title:"Situación neutral", sub:"Los precios están cerca de los promedios. Mirá tu contexto puntual.", cls:"neutro" };
  if (score > 0.3)  verdict = { title: claro ? "¡Vendé soja!"    : "Leve ventaja: vender soja",    sub: claro ? "La soja está por encima de su promedio reciente. Buen momento para liquidar."          : "Pequeña ventaja de vender soja. Revisá tu stock.", cls:"soja" };
  if (score < -0.3) verdict = { title: claro ? "¡Vendé dólares!" : "Leve ventaja: vender dólares", sub: claro ? "El dólar está caro y/o la soja barata vs promedio. Guardá la soja y liquidá dólares." : "Pequeña ventaja de vender dólares. Revisá tu stock.", cls:"dolares" };
  const vt = tint[verdict.cls];

  const pct = Math.max(5, Math.min(95, 50 + score * 18));
  const sojaPs  = v.tn_soja   * v.soja_hoy;
  const dolarPs = v.usd_dolar * v.dolar_hoy;

  const S = {
    page:  { maxWidth:520, margin:"0 auto", minHeight:"100vh", padding:"20px 16px 48px" },
    grid2: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 },
    card:  { background:T.surface, border:`1px solid ${T.border}`, borderRadius:T.rs, padding:"13px 14px" },
  };

  const tabDecision = h("div", null,
    h(SecLabel, null, "Precios de hoy"),
    h("div", { style: S.grid2 },
      h(NumInput, { label:"Soja BCR Rosario", value:v.soja_hoy,  onChange:set("soja_hoy"),  unit:"$/tn · pizarra", step:1000, icon:"plant-2", accent:T.soja }),
      h(NumInput, { label:"Dólar oficial",     value:v.dolar_hoy, onChange:set("dolar_hoy"), unit:"$/USD · venta BCRA", step:10, icon:"currency-dollar", accent:T.dolar })
    ),
    h(SecLabel, null, "Promedios de referencia (últimos 3 meses)"),
    h("div", { style: S.grid2 },
      h(NumInput, { label:"Soja promedio",  value:v.soja_prom,  onChange:set("soja_prom"),  unit:"$/tn",  step:1000 }),
      h(NumInput, { label:"Dólar promedio", value:v.dolar_prom, onChange:set("dolar_prom"), unit:"$/USD", step:10   })
    ),
    h("div", { style:{ background:vt.bg, border:`1px solid ${vt.border}`, borderRadius:T.r, padding:"18px 16px", margin:"16px 0" } },
      h("div", { style:{ display:"flex", alignItems:"center", gap:14 } },
        h("div", { style:{ width:54, height:54, flexShrink:0, borderRadius:15, background:vt.bg, border:`1px solid ${vt.border}`, display:"flex", alignItems:"center", justifyContent:"center" } }, ic(vt.icon, 27, vt.fg)),
        h("div", null,
          h("div", { style:{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" } },
            h("span", { style:{ fontSize:22, fontWeight:800, color:T.text, letterSpacing:"-0.02em" } }, verdict.title),
            claro ? h("span", { style:{ fontSize:11, fontWeight:600, color:T.bg, background:vt.fg, borderRadius:6, padding:"2px 7px" } }, "señal fuerte") : null
          ),
          h("div", { style:{ fontSize:13, color:T.text3, lineHeight:1.45, marginTop:3 } }, verdict.sub)
        )
      )
    ),
    h(SecLabel, null, "Señales"),
    h("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:12 } },
      ...[
        { val:PCT(soja_rel),  lbl:"Soja vs prom.",  col: soja_rel  >= 0 ? T.soja : T.red },
        { val:PCT(dolar_rel), lbl:"Dólar vs prom.", col: dolar_rel >= 0 ? T.soja : T.red },
        { val:(score>0?"+":"")+score.toFixed(2), lbl:"Score", col: score>0.3?T.soja:score<-0.3?T.dolar:T.score },
      ].map((m,i) => h("div", { key:i, style:{ ...S.card, textAlign:"center", padding:"14px 8px" } },
        h("div", { style:{ fontSize:18, fontWeight:700, color:m.col, marginBottom:3 } }, m.val),
        h("div", { style:{ fontSize:11, color:T.text3 } }, m.lbl)
      ))
    ),
    h("div", { style:{ ...S.card, marginBottom:12 } },
      h("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:12.5, fontWeight:500, marginBottom:11 } },
        h("span", { style:{ color:T.soja } }, "Vender soja"),
        h("span", { style:{ color:T.dolar } }, "Vender dólares")
      ),
      h("div", { style:{ position:"relative", height:9, background:T.bg, borderRadius:6 } },
        h("div", { style:{ position:"absolute", left:0, top:0, height:"100%", width:pct+"%", background:T.soja, borderRadius:6, transition:"width 0.4s" } }),
        h("div", { style:{ position:"absolute", left:pct+"%", top:"50%", width:18, height:18, borderRadius:"50%", background:T.text, border:`3px solid ${T.bg}`, transform:"translate(-50%,-50%)", transition:"left 0.4s" } })
      )
    ),
    h("div", { style:{ ...S.card, marginBottom:16 } },
      h("div", { style:{ display:"flex", alignItems:"center", gap:7, fontSize:12.5, fontWeight:600, color:T.text2, marginBottom:10 } }, ic("list-search", 16, T.text3), h("span", null, "Por qué esta recomendación")),
      razones.length === 0
        ? h("div", { style:{ fontSize:13.5, color:T.text3 } }, "Precios dentro del rango normal, sin señal clara.")
        : razones.map((r,i) => h("div", { key:i, style:{ display:"flex", alignItems:"flex-start", gap:9, fontSize:13.5, lineHeight:1.5, padding:"8px 0", borderBottom: i<razones.length-1?`1px solid ${T.surface2}`:"none" } },
            h("span", { style:{ marginTop:1 } }, ic(CICON[r.c]||"point", 16, CMAP[r.c]||T.score)),
            h("span", null, h("span", { style:{ color:T.text2, fontWeight:500 } }, r.t), h("span", { style:{ color:T.text3 } }, " — "+r.d))
          ))
    ),
    h("div", { style:{ fontSize:11.5, color:T.faint, textAlign:"center", lineHeight:1.8 } },
      "Soja: ", h("a", { href:"https://www.cac.bcr.com.ar/es/precios-de-pizarra", target:"_blank", style:{ color:T.score, textDecoration:"none" } }, "Cámara Arbitral BCR"),
      " · Dólar: ", h("a", { href:"https://dolarhoy.com/cotizaciondolaroficial", target:"_blank", style:{ color:T.score, textDecoration:"none" } }, "Dólar Oficial")
    )
  );

  const tabSituacion = h("div", null,
    h(SecLabel, null, "Mi stock disponible"),
    h("div", { style: S.grid2 },
      h(Slider, { label:"Stock de dólares", value:v.stock_d, onChange:set("stock_d"), hint:"1 = pocos · 5 = de sobra" }),
      h(Slider, { label:"Stock de soja",    value:v.stock_s, onChange:set("stock_s"), hint:"1 = poca · 5 = mucha" })
    ),
    h(SecLabel, null, "Mi contexto"),
    h("div", { style: S.grid2 },
      h(Slider, { label:"Urgencia de pesos", value:v.urgencia, onChange:set("urgencia"), hint:"1 = tengo tiempo · 5 = ya" }),
      h(Slider, { label:"Expectativa soja",  value:v.expect_s, onChange:set("expect_s"), hint:"1 = va a bajar · 5 = a subir" })
    ),
    h(SecLabel, null, "Cuánto necesito liquidar"),
    h("div", { style: S.grid2 },
      h(NumInput, { label:"Tn de soja a vender", value:v.tn_soja,   onChange:set("tn_soja"),   unit:"toneladas", step:10, icon:"plant-2", accent:T.soja  }),
      h(NumInput, { label:"USD a vender",         value:v.usd_dolar, onChange:set("usd_dolar"), unit:"dólares",   step:500, icon:"currency-dollar", accent:T.dolar })
    ),
    h("div", { style:{ ...S.card, marginTop:12 } },
      h("div", { style:{ display:"flex", alignItems:"center", gap:7, fontSize:12.5, fontWeight:600, color:T.text2, marginBottom:12 } }, ic("cash", 16, T.soja), h("span", null, "Equivalencia en pesos")),
      h("div", { style: S.grid2 },
        h("div", null,
          h("div", { style:{ fontSize:12, color:T.text3, marginBottom:4 } }, "Si vendés soja"),
          h("div", { style:{ fontSize:22, fontWeight:700, color:T.soja } }, "$" + FMT(sojaPs)),
          h("div", { style:{ fontSize:11.5, color:T.faint, marginTop:2 } }, v.tn_soja + " tn × $" + FMT(v.soja_hoy) + "/tn")
        ),
        h("div", null,
          h("div", { style:{ fontSize:12, color:T.text3, marginBottom:4 } }, "Si vendés dólares"),
          h("div", { style:{ fontSize:22, fontWeight:700, color:T.dolar } }, "$" + FMT(dolarPs)),
          h("div", { style:{ fontSize:11.5, color:T.faint, marginTop:2 } }, FMT(v.usd_dolar) + " USD × $" + FMT(v.dolar_hoy))
        )
      ),
      h("div", { style:{ marginTop:14, paddingTop:12, borderTop:`1px solid ${T.border}`, fontSize:13, color:T.text3 } },
        "Diferencia: ",
        h("span", { style:{ color: sojaPs>dolarPs ? T.soja : T.dolar, fontWeight:700 } }, "$" + FMT(Math.abs(sojaPs-dolarPs))),
        " a favor de " + (sojaPs>dolarPs ? "vender soja" : "vender dólares")
      )
    )
  );

  const HIST_SUBS = [ { icon:"box", label:"Ventas" }, { icon:"chart-line", label:"Precios" }, { icon:"pencil", label:"Registros" } ];
  const DC = { soja:{ fg:T.soja, lbl:"Soja" }, dolares:{ fg:T.dolar, lbl:"Dólares" }, mixto:{ fg:T.score, lbl:"Mixto" } };
  const thS = { fontSize:11, color:T.text3, fontWeight:600, padding:"8px", textAlign:"right", borderBottom:`1px solid ${T.border}`, whiteSpace:"nowrap" };
  const tdS = { padding:"9px 8px", color:T.text2, borderBottom:`1px solid ${T.surface2}`, textAlign:"right", fontSize:13.5 };
  const tdN = { padding:"9px 8px", color:T.text, borderBottom:`1px solid ${T.surface2}`, fontSize:13.5, fontWeight:600 };

  const ventas   = apiData ? apiData.ventas.filter(r => r.nombre !== "TOTAL") : [];
  const totalRow = apiData ? apiData.ventas.find(r => r.nombre === "TOTAL") : null;
  const precios  = apiData ? apiData.precios : [];
  const precioActual = precios.length ? precios[precios.length - 1].soja : 465000;
  const mesActual    = precios.length ? precios[precios.length - 1].mes  : "";
  const totalVendido = totalRow ? totalRow.ventas.reduce((a,b) => a+b, 0) : 0;
  const totalResto   = totalRow ? totalRow.resto : 0;

  const loadingEl = h("div", { style:{ textAlign:"center", color:T.text3, padding:34, fontSize:13 } }, "Cargando datos de la planilla…");
  const errorEl   = h("div", { style:{ textAlign:"center", color:T.red, padding:34, fontSize:13 } }, apiErr);

  const inputBase = { width:"100%", background:T.bg, border:`1px solid ${T.border}`, borderRadius:9, color:T.text, fontSize:14, fontFamily:"inherit", padding:"10px 11px", outline:"none" };
  const formVenta = h("div", { style:{ ...S.card, marginBottom:14 } },
    h("div", { style:{ display:"flex", alignItems:"center", gap:7, fontSize:12.5, fontWeight:600, color:T.text2, marginBottom:11 } }, ic("plus", 16, T.soja), h("span", null, "Registrar venta")),
    h("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:10 } },
      h("select", { value:vForm.socio, onChange:e => setVForm(p => ({ ...p, socio:e.target.value })), style: inputBase },
        h("option", { value:"" }, "Socio"),
        ...ventas.map((r,i) => h("option", { key:i, value:r.nombre }, r.nombre))
      ),
      h("select", { value:vForm.mes, onChange:e => setVForm(p => ({ ...p, mes:e.target.value })), style: inputBase },
        h("option", { value:"" }, "Mes"),
        ...MESES_CAMP.map((m,i) => h("option", { key:i, value:m }, m))
      ),
      h("input", { type:"number", inputMode:"decimal", step:"0.5", min:"0", placeholder:"Toneladas",
        value:vForm.tn, onChange:e => setVForm(p => ({ ...p, tn:e.target.value })), style: inputBase })
    ),
    h("button", { onClick:registrarVenta, disabled:vSaving,
      style:{ width:"100%", padding:12, background: vSaving ? T.surface2 : T.soja, border:"none", borderRadius:T.rs, color: vSaving ? T.faint : T.bg, fontSize:14, fontWeight:700, cursor: vSaving ? "default" : "pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:7 } },
      vSaving ? "Guardando…" : [ic("device-floppy", 16), "Registrar venta"]
    ),
    vMsg && h("div", { style:{ display:"flex", alignItems:"flex-start", gap:7, marginTop:11, fontSize:12.5, fontWeight:500, color: vMsg.ok ? T.soja : T.red } },
      ic(vMsg.ok ? "circle-check" : "alert-triangle", 15), h("span", null, vMsg.txt))
  );

  const subVentas = apiLoad ? loadingEl : apiErr ? errorEl : h("div", null,
    formVenta,
    h("div", { style:{ fontSize:11.5, color:T.text3, marginBottom:11, lineHeight:1.6 } },
      "Campaña 2026-2027 · Stock inicial 12 tn/socio · Precio actual $" + FMT(precioActual) + "/tn · Actualizado " + (apiData ? new Date(apiData.actualizado).toLocaleDateString("es-AR") : "")
    ),
    h("div", { style:{ overflowX:"auto" } },
      h("table", { style:{ width:"100%", borderCollapse:"collapse" } },
        h("thead", null, h("tr", null,
          h("th", { style:{ ...thS, textAlign:"left" } }, "Socio"),
          h("th", { style: thS }, "Stock"),
          ...MESES_CAMP.map((m,i) => h("th", { key:i, style: thS }, m)),
          h("th", { style:{ ...thS, color:T.score } }, "Resto")
        )),
        h("tbody", null,
          ...ventas.map((r, ri) => h("tr", { key:ri },
            h("td", { style: tdN }, r.nombre),
            h("td", { style: tdS }, r.stock),
            ...r.ventas.map((v2, mi) => h("td", { key:mi, style:{ ...tdS, color: v2 > 0 ? T.soja : T.faint } }, v2 > 0 ? v2 : "—")),
            h("td", { style:{ ...tdS, color:T.score, fontWeight:700 } }, r.resto)
          )),
          totalRow && h("tr", null,
            h("td", { style:{ ...tdN, borderTop:`1px solid ${T.borderStrong}` } }, "TOTAL"),
            h("td", { style:{ ...tdS, fontWeight:700, color:T.text, borderTop:`1px solid ${T.borderStrong}` } }, totalRow.stock),
            ...totalRow.ventas.map((v2, mi) => h("td", { key:mi, style:{ ...tdS, fontWeight:700, color: v2 > 0 ? T.soja : T.faint, borderTop:`1px solid ${T.borderStrong}` } }, v2 > 0 ? v2 : "—")),
            h("td", { style:{ ...tdS, fontWeight:700, color:T.score, borderTop:`1px solid ${T.borderStrong}` } }, totalRow.resto)
          )
        )
      )
    ),
    totalRow && h("div", { style:{ marginTop:12, padding:"11px 13px", background:T.sojaBg, border:`1px solid ${T.sojaBorder}`, borderRadius:T.rs, fontSize:12, color:T.text2 } },
      "Total vendido: ", h("span", { style:{ color:T.soja, fontWeight:700 } }, totalVendido + " tn"),
      "  ·  Facturación: ", h("span", { style:{ color:T.soja, fontWeight:700 } }, "$" + FMT(totalVendido * precioActual)),
      "  ·  Resto: ", h("span", { style:{ color:T.score, fontWeight:700 } }, totalResto + " tn")
    )
  );

  const subPrecios = apiLoad ? loadingEl : apiErr ? errorEl : h("div", null,
    h(PriceChart, { precios: priceHist.length ? priceHist : precios }),
    h("div", { style:{ overflowX:"auto" } },
      h("table", { style:{ width:"100%", borderCollapse:"collapse" } },
        h("thead", null, h("tr", null,
          ...["Mes", "Dólar oficial", "Soja $/tn"].map((lbl,i) =>
            h("th", { key:i, style:{ ...thS, textAlign: i===0 ? "left" : "right" } }, lbl)
          )
        )),
        h("tbody", null,
          ...[...precios].reverse().map((row, ri) => {
            const ia = row.mes === mesActual;
            return h("tr", { key:ri, style: ia ? { background:T.sojaBg } : {} },
              h("td", { style:{ ...tdN, color: ia ? T.soja : T.text2 } }, row.mes + (ia ? "  ◀" : "")),
              h("td", { style:{ ...tdS, color: ia ? T.dolar : T.text2 } }, "$" + FMT(row.dolar)),
              h("td", { style:{ ...tdS, color: ia ? T.soja : T.text2 } }, "$" + FMT(row.soja))
            );
          })
        )
      )
    )
  );

  const subRegistros = h("div", null,
    h("div", { style:{ ...S.grid2, marginBottom:9 } },
      ...[
        { lbl:"Mes", key:"mes", type:"text", placeholder:"Jun 2026" },
        { lbl:"Soja $/tn", key:"soja", type:"number" },
        { lbl:"Dólar $/USD", key:"dolar", type:"number" },
      ].map(f => h("div", { key:f.key, style: S.card },
        h("div", { style:{ fontSize:11.5, fontWeight:500, color:T.text3, marginBottom:6 } }, f.lbl),
        h("input", { type:f.type||"text", value:hForm[f.key], placeholder:f.placeholder||"",
          onChange: e => setHForm(p => ({ ...p, [f.key]: e.target.value })),
          style:{ width:"100%", background:"transparent", border:"none", outline:"none", color:T.text, fontSize:15, fontWeight:600, fontFamily:"inherit" } })
      )),
      h("div", { style: S.card },
        h("div", { style:{ fontSize:11.5, fontWeight:500, color:T.text3, marginBottom:6 } }, "Decisión"),
        h("select", { value:hForm.decision, onChange: e => setHForm(p => ({ ...p, decision: e.target.value })),
          style:{ background:"transparent", border:"none", outline:"none", color:T.text, fontSize:14, fontWeight:600, fontFamily:"inherit", width:"100%", cursor:"pointer" } },
          h("option", { value:"soja" }, "Soja"),
          h("option", { value:"dolares" }, "Dólares"),
          h("option", { value:"mixto" }, "Mixto")
        )
      )
    ),
    h("button", {
      onClick: () => {
        if (!hForm.mes || !hForm.soja || !hForm.dolar) return;
        saveHist([...hist, { ...hForm, fecha: Date.now() }]);
        setHForm({ mes:"", soja:"", dolar:"", decision:"soja" });
      },
      style:{ width:"100%", padding:12, background:T.surface2, border:`1px solid ${T.borderStrong}`, borderRadius:T.rs, color:T.text, fontSize:13.5, fontWeight:600, cursor:"pointer", marginBottom:14, display:"flex", alignItems:"center", justifyContent:"center", gap:7 }
    }, ic("plus", 16), "Agregar registro"),
    hist.length === 0
      ? h("div", { style:{ textAlign:"center", color:T.text3, fontSize:13, padding:"30px 16px", border:`1px dashed ${T.border}`, borderRadius:T.rs } }, "Sin registros todavía.")
      : h("div", { style:{ overflowX:"auto" } },
          h("table", { style:{ width:"100%", borderCollapse:"collapse", fontSize:13 } },
            h("thead", null, h("tr", null,
              ...["Mes","Soja","Dólar","Decisión",""].map((lbl,i) =>
                h("th", { key:i, style:{ ...thS, textAlign: i===0?"left":"right" } }, lbl)
              )
            )),
            h("tbody", null,
              ...[...hist].reverse().map((row, ri) => {
                const realIdx = hist.length - 1 - ri;
                const bc = DC[row.decision] || DC.mixto;
                return h("tr", { key:ri },
                  h("td", { style:{ ...tdN, textAlign:"left", fontWeight:500 } }, row.mes),
                  h("td", { style: tdS }, "$" + FMT(row.soja)),
                  h("td", { style: tdS }, "$" + FMT(row.dolar)),
                  h("td", { style:{ padding:"8px", borderBottom:`1px solid ${T.surface2}` } },
                    h("span", { style:{ display:"inline-block", padding:"2px 9px", borderRadius:6, fontSize:11, fontWeight:600, background:T.surface2, color:bc.fg, border:`1px solid ${T.border}` } }, bc.lbl)
                  ),
                  h("td", { style:{ padding:"8px", textAlign:"right", borderBottom:`1px solid ${T.surface2}` } },
                    h("button", { onClick: () => saveHist(hist.filter((_,i) => i !== realIdx)), "aria-label":"borrar",
                      style:{ background:"none", border:"none", color:T.text3, cursor:"pointer", display:"inline-flex" } }, ic("x", 15))
                  )
                );
              })
            )
          )
        )
  );

  const tabHistorial = h("div", null,
    h("div", { style:{ display:"flex", gap:5, background:T.segBg, border:`1px solid ${T.border}`, borderRadius:11, padding:4, marginBottom:14 } },
      ...HIST_SUBS.map((t,i) =>
        h("button", { key:i, onClick: () => setHistSub(i),
          style:{ flex:1, padding:"10px 4px", borderRadius:8, border:"none", background: histSub===i?T.surface2:"transparent", color: histSub===i?T.soja:T.text3, fontSize:12.5, fontWeight: histSub===i?600:500, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 } },
          ic(t.icon, 15), t.label
        )
      )
    ),
    histSub === 0 ? subVentas : histSub === 1 ? subPrecios : subRegistros
  );

  return h("div", { style: S.page },
    h("div", { style:{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18 } },
      h("div", { style:{ display:"flex", alignItems:"center", gap:11 } },
        h("div", { style:{ width:40, height:40, borderRadius:12, background:T.sojaBg, border:`1px solid ${T.sojaBorder}`, display:"flex", alignItems:"center", justifyContent:"center" } }, ic("plant-2", 22, T.soja)),
        h("div", null,
          h("div", { style:{ fontSize:17, fontWeight:700, color:T.text, letterSpacing:"-0.01em" } }, "Soja vs Dólar"),
          h("div", { style:{ fontSize:11.5, color:T.text3, marginTop:1 } }, "Pizarra BCR · dólar oficial · diario")
        )
      ),
      h("button", { onClick:logout, "aria-label":"cerrar sesión",
        style:{ display:"flex", alignItems:"center", gap:5, fontSize:12, fontWeight:500, color:T.text3, background:T.surface, border:`1px solid ${T.border}`, borderRadius:9, padding:"7px 11px", cursor:"pointer" } },
        ic("logout", 15), h("span", null, "Salir"))
    ),
    h("div", { style:{ display:"flex", gap:5, background:T.segBg, border:`1px solid ${T.border}`, borderRadius:12, padding:4, marginBottom:16 } },
      ...TABS.map((t,i) =>
        h("button", { key:i, onClick: () => setTab(i),
          style:{ flex:1, padding:"10px 4px", borderRadius:9, border:"none", background: tab===i?T.surface2:"transparent", color: tab===i?T.text:T.text3, fontSize:12.5, fontWeight: tab===i?600:500, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 } },
          ic(t.icon, 16, tab===i?T.soja:T.text3), h("span", null, t.label)
        )
      )
    ),
    tab === 0 ? tabDecision : tab === 1 ? tabHistorial : tabSituacion
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App, null));
</script>
</body>
</html>
