<!DOCTYPE html>

<head>

<script>
const { useState, useEffect, createElement: h } = React;

const PASS_HASH = "82abcf76bd4eceabc29b85fb7cf90f999c0de5a8673e66a85c6d827a3c664259";

async function hashStr(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

function Login({ onSuccess }) {
  const [pwd, setPwd] = useState("");
  const [error, setError] = useState(false);
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    setLoading(true);
    const h2 = await hashStr(pwd);
    if (h2 === PASS_HASH) {
      sessionStorage.setItem("auth", "1");
      onSuccess();
    } else {
      setError(true);
      setLoading(false);
      setPwd("");
    }
  };

  return h("div", { style: { display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", padding:24, background:"#0c0e14" } },
    h("span", { style: { fontSize:48, marginBottom:16 } }, "🌾"),
    h("div", { style: { fontSize:18, fontWeight:800, color:"#e8edf5", marginBottom:4 } }, "SOJA vs DÓLAR"),
    h("div", { style: { fontSize:11, color:"#2e3650", marginBottom:32 } }, "Herramientas de campo · Acceso familiar"),
    h("div", { style: { width:"100%", maxWidth:320 } },
      h("div", { style: { fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.1em", color:"#3a4460", marginBottom:8 } }, "Contraseña"),
      h("input", {
        type:"password", value:pwd, placeholder:"Ingresá la contraseña",
        onChange: e => { setPwd(e.target.value); setError(false); },
        onKeyDown: e => e.key === "Enter" && submit(),
        style: { width:"100%", padding:"12px 14px", background:"#141722", border:`1px solid ${error?"#ef4444":"#1e2130"}`, borderRadius:9, color:"#e8edf5", fontSize:15, fontFamily:"inherit", outline:"none", marginBottom:8 }
      }),
      error && h("div", { style: { fontSize:11, color:"#ef4444", marginBottom:8 } }, "Contraseña incorrecta"),
      h("button", {
        onClick: submit, disabled: loading || !pwd,
        style: { width:"100%", padding:"12px", background: pwd ? "#3b5bdb" : "#1a2040", border:"none", borderRadius:9, color: pwd ? "white" : "#3a4460", fontSize:14, fontWeight:700, cursor: pwd ? "pointer" : "default" }
      }, loading ? "Verificando..." : "Entrar")
    )
  );
}

const FMT = (n) => Number(n).toLocaleString("es-AR", { maximumFractionDigits: 0 });
const PCT = (v) => (v >= 0 ? "+" : "") + (v * 100).toFixed(1) + "%";

const DEFAULTS = {
  soja_hoy: 465000, dolar_hoy: 1478,
  soja_prom: 440000, dolar_prom: 1430,
  stock_d: 3, stock_s: 3, urgencia: 3, expect_s: 3,
  tn_soja: 50, usd_dolar: 10000,
};

const TABS = ["📊 Decisión", "📅 Historial", "⚙️ Mi situación"];

const API_URL = "https://script.google.com/macros/s/AKfycbwsdAE_vLrAHUQ_Ls1FE0zhaJxZVTdJfobl5YsFMOZulgDotLMPRL1-Cx-AQ-jb4eDp/exec?token=campo-soja-2026";
const MESES_CAMP = ["JUN","JUL","AGO","SEP","OCT","NOV","DIC","ENE","FEB","MAR","ABR","MAY"];
const COLORS = { green: "#22c55e", red: "#ef4444", yellow: "#eab308", blue: "#7a9fff", gray: "#4a5568" };

function calcScore(v) {
  const { soja_hoy, dolar_hoy, soja_prom, dolar_prom, stock_d, stock_s, urgencia, expect_s } = v;
  if (!soja_hoy || !dolar_hoy || !soja_prom || !dolar_prom) return { score: 0, soja_rel: 0, dolar_rel: 0, razones: [] };

  const soja_rel  = (soja_hoy  - soja_prom)  / soja_prom;
  const dolar_rel = (dolar_hoy - dolar_prom) / dolar_prom;
  let score = 0;
  const razones = [];

  score += soja_rel * 3.5;
  if (soja_rel > 0.02)  razones.push({ e: "✅", t: `Soja ${PCT(soja_rel)} sobre su promedio`, c: "green", d: "→ buen momento para liquidar" });
  else if (soja_rel < -0.02) razones.push({ e: "⚠️", t: `Soja ${PCT(soja_rel)} bajo su promedio`, c: "red", d: "→ conviene guardarla" });

  score -= dolar_rel * 2.5;
  if (dolar_rel > 0.02)  razones.push({ e: "💵", t: `Dólar ${PCT(dolar_rel)} sobre su promedio`, c: "green", d: "→ buen momento para vender dólares" });
  else if (dolar_rel < -0.02) razones.push({ e: "💵", t: `Dólar ${PCT(dolar_rel)} bajo su promedio`, c: "red", d: "→ guardá los dólares" });

  score -= (stock_d - 3) * 0.35;
  if (stock_d >= 4) razones.push({ e: "💼", t: "Buen stock de dólares", c: "blue", d: "→ podés vender sin quedar descubierto" });
  if (stock_d <= 2) razones.push({ e: "⚠️", t: "Poco stock de dólares", c: "yellow", d: "→ cuidado con vender muchos" });

  score += (stock_s - 3) * 0.25;
  if (stock_s >= 4) razones.push({ e: "🌾", t: "Mucha soja en stock", c: "green", d: "→ podés vender sin apuro" });

  score -= (expect_s - 3) * 0.6;
  if (expect_s >= 4) razones.push({ e: "📈", t: "Esperás que suba la soja", c: "blue", d: "→ guardala y vendé dólares ahora" });
  if (expect_s <= 2) razones.push({ e: "📉", t: "Esperás que baje la soja", c: "yellow", d: "→ mejor vender ahora que después" });

  if (urgencia >= 4) razones.push({ e: "⏰", t: "Alta urgencia de pesos", c: "gray", d: "→ actuá rápido con lo que esté mejor" });

  return { score, soja_rel, dolar_rel, razones };
}

function Slider({ label, value, onChange, hint }) {
  return h("div", { style: { background:"#141722", border:"1px solid #1e2130", borderRadius:12, padding:"14px 14px" } },
    h("div", { style: { display:"flex", justifyContent:"space-between", fontSize:13, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em", color:"#3a4460", marginBottom:10 } },
      h("span", null, label),
      h("span", { style: { color:"#7a9fff", fontSize:16 } }, value)
    ),
    h("input", { type:"range", min:1, max:5, value, onChange: e => onChange(Number(e.target.value)),
      style: { height:6 } }),
    h("div", { style: { fontSize:12, color:"#2e3650", marginTop:6 } }, hint)
  );
}

function NumInput({ label, value, onChange, unit, step }) {
  step = step || 1000;
  return h("div", { style: { background:"#141722", border:"1px solid #1e2130", borderRadius:12, padding:"14px 14px" } },
    h("div", { style: { fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em", color:"#3a4460", marginBottom:6 } }, label),
    h("input", { type:"number", value, step, onChange: e => onChange(Number(e.target.value)),
      style: { width:"100%", background:"transparent", border:"none", outline:"none", color:"#e8edf5", fontSize:20, fontWeight:700, fontFamily:"inherit" } }),
    h("div", { style: { fontSize:12, color:"#2e3650", marginTop:3 } }, unit)
  );
}

// Parser de "MES AÑO" (ej. "JUN 2026") → fecha ISO a mitad de mes.
const MES_NUM = { ENE:0, FEB:1, MAR:2, ABR:3, MAY:4, JUN:5, JUL:6, AGO:7, SEP:8, OCT:9, NOV:10, DIC:11 };
function mesToFecha(mes) {
  const m = String(mes).trim().toUpperCase().match(/([A-Z]{3})\s*(\d{4})/);
  if (!m || MES_NUM[m[1]] == null) return null;
  return `${m[2]}-${String(MES_NUM[m[1]] + 1).padStart(2, "0")}-15`;
}

// Gráfico de líneas (SVG, sin dependencias). Doble eje: soja $/tn (verde) y dólar $/USD (amarillo).
function Chart({ dolar, soja }) {
  const W = 700, H = 280, L = 8, R = 8, T = 16, B = 26;
  const series = [dolar, soja].filter(s => s && s.length > 1);
  if (series.length === 0) return h("div", { style: { fontSize:13, color:"#3a4460", textAlign:"center", padding:"40px 0" } }, "Sin datos suficientes para el gráfico.");

  const ts = (f) => Date.parse(f);
  const allDates = series.flat().map(p => ts(p.fecha));
  const x0 = Math.min(...allDates), x1 = Math.max(...allDates);
  const sx = (f) => L + ((ts(f) - x0) / (x1 - x0 || 1)) * (W - L - R);

  const scaleY = (arr) => {
    const vs = arr.map(p => p.valor);
    let lo = Math.min(...vs), hi = Math.max(...vs);
    const pad = (hi - lo) * 0.12 || hi * 0.1;
    lo -= pad; hi += pad;
    return (v) => T + (1 - (v - lo) / (hi - lo || 1)) * (H - T - B);
  };
  const path = (arr, sy) => arr.map((p, i) => (i ? "L" : "M") + sx(p.fecha).toFixed(1) + " " + sy(p.valor).toFixed(1)).join(" ");

  const syS = soja && soja.length ? scaleY(soja) : null;
  const syD = dolar && dolar.length ? scaleY(dolar) : null;

  const months = []; const seen = new Set();
  series.flat().sort((a,b)=>ts(a.fecha)-ts(b.fecha)).forEach(p => {
    const k = p.fecha.slice(0,7);
    if (!seen.has(k)) { seen.add(k); months.push(p.fecha); }
  });
  const MM = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  const lastS = soja && soja.length ? soja[soja.length-1] : null;
  const lastD = dolar && dolar.length ? dolar[dolar.length-1] : null;

  return h("div", null,
    h("div", { style: { display:"flex", gap:16, justifyContent:"center", marginBottom:8, fontSize:12, fontWeight:700 } },
      h("span", { style: { color:"#22c55e" } }, "● Soja $/tn"),
      h("span", { style: { color:"#eab308" } }, "● Dólar MEP $/USD")
    ),
    h("svg", { viewBox:`0 0 ${W} ${H}`, style: { width:"100%", height:"auto", display:"block" }, preserveAspectRatio:"none" },
      ...[0.25,0.5,0.75].map((g,i) => h("line", { key:"g"+i, x1:L, x2:W-R, y1:T+g*(H-T-B), y2:T+g*(H-T-B), stroke:"#1a1e2e", strokeWidth:1 })),
      ...months.map((f,i) => h("text", { key:"m"+i, x:sx(f), y:H-8, fill:"#3a4460", fontSize:9, textAnchor:"middle" }, MM[new Date(f).getMonth()])),
      syD ? h("path", { d:path(dolar, syD), fill:"none", stroke:"#eab308", strokeWidth:1.6, strokeLinejoin:"round", strokeLinecap:"round" }) : null,
      syS ? h("path", { d:path(soja, syS), fill:"none", stroke:"#22c55e", strokeWidth:1.8, strokeLinejoin:"round", strokeLinecap:"round" }) : null,
      lastD && syD ? h("circle", { cx:sx(lastD.fecha), cy:syD(lastD.valor), r:3, fill:"#eab308" }) : null,
      lastS && syS ? h("circle", { cx:sx(lastS.fecha), cy:syS(lastS.valor), r:3, fill:"#22c55e" }) : null
    ),
    h("div", { style: { display:"flex", justifyContent:"space-between", marginTop:6, fontSize:12 } },
      lastS ? h("span", { style: { color:"#22c55e", fontWeight:700 } }, "Soja $"+Number(lastS.valor).toLocaleString("es-AR")+"/tn") : h("span"),
      lastD ? h("span", { style: { color:"#eab308", fontWeight:700 } }, "Dólar $"+Number(lastD.valor).toLocaleString("es-AR")) : h("span")
    )
  );
}

function App() {
  const [auth, setAuth]       = useState(() => sessionStorage.getItem("auth") === "1");
  const [tab, setTab]         = useState(0);
  const [v, setV]             = useState(DEFAULTS);
  const [hist, setHist]       = useState(() => {
    try { return JSON.parse(localStorage.getItem("soja_hist_v3") || "[]"); } catch { return []; }
  });
  const [hForm, setHForm]     = useState({ mes:"", soja:"", dolar:"", decision:"soja" });
  const [histSub, setHistSub] = useState(0);
  const [apiData, setApiData] = useState(null);
  const [apiLoad, setApiLoad] = useState(false);
  const [apiErr,  setApiErr]  = useState(null);
  const [dolarDiario, setDolarDiario] = useState(null);

  useEffect(() => {
    if (!auth) return;
    setApiLoad(true);
    fetch(API_URL)
      .then(r => r.json())
      .then(d => { setApiData(d); setApiLoad(false); })
      .catch(() => { setApiErr("No se pudo cargar la planilla."); setApiLoad(false); });
  }, [auth]);

  // Dólar MEP diario en vivo (ArgentinaDatos, CORS libre). Últimos ~13 meses.
  useEffect(() => {
    if (!auth) return;
    fetch("https://api.argentinadatos.com/v1/cotizaciones/dolares/bolsa")
      .then(r => r.json())
      .then(arr => {
        const cutoff = new Date(Date.now() - 400 * 86400000).toISOString().slice(0, 10);
        const serie = arr
          .filter(d => d.fecha >= cutoff && d.venta)
          .map(d => ({ fecha: d.fecha, valor: Math.round(d.venta) }))
          .sort((a, b) => a.fecha.localeCompare(b.fecha));
        setDolarDiario(serie);
        // Autocompleta el dólar de hoy con el último valor real.
        const last = serie[serie.length - 1];
        if (last) setV(prev => ({ ...prev, dolar_hoy: last.valor }));
      })
      .catch(() => {}); // si falla, el gráfico usa el dólar mensual de la planilla
  }, [auth]);

  if (!auth) return h(Login, { onSuccess: () => setAuth(true) });

  const set = (k) => (val) => setV(prev => ({ ...prev, [k]: val }));

  const saveHist = (arr) => {
    setHist(arr);
    try { localStorage.setItem("soja_hist_v3", JSON.stringify(arr)); } catch {}
  };

  const { score, soja_rel, dolar_rel, razones } = calcScore(v);
  const abs = Math.abs(score);
  const claro = abs > 1.2;

  let verdict = { emoji:"⚖️", title:"Situación neutral", sub:"Los precios están cerca de los promedios. Mirá tu contexto puntual.", cls:"neutro" };
  if (score > 0.3)  verdict = { emoji:"🌾", title: claro ? "¡VENDÉ SOJA!"     : "Leve ventaja: vender soja",    sub: claro ? "La soja está por encima de su promedio reciente. Buen momento para liquidar."              : "Pequeña ventaja de vender soja. Revisá tu stock.", cls:"soja" };
  if (score < -0.3) verdict = { emoji:"💵", title: claro ? "¡VENDÉ DÓLARES!"  : "Leve ventaja: vender dólares", sub: claro ? "El dólar está caro y/o la soja barata vs promedio. Guardá la soja y liquidá dólares." : "Pequeña ventaja de vender dólares. Revisá tu stock.", cls:"dolares" };

  const vc = { soja:{ bg:"#0b1f11", border:"#22c55e", title:"#22c55e" }, dolares:{ bg:"#1a1600", border:"#eab308", title:"#eab308" }, neutro:{ bg:"#0e1225", border:"#3b5bdb", title:"#7a9fff" } }[verdict.cls];
  const pct = Math.max(5, Math.min(95, 50 + score * 18));
  const sojaPs  = v.tn_soja   * v.soja_hoy;
  const dolarPs = v.usd_dolar * v.dolar_hoy;

  const S = {
    page:     { background:"#0c0e14", minHeight:"100vh", padding:"20px 16px 48px", color:"#d4dae8" },
    secLabel: { fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", color:"#2e3650", marginBottom:10, marginTop:18 },
    grid2:    { display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 },
    card:     { background:"#141722", border:"1px solid #1e2130", borderRadius:12, padding:"14px 14px" },
  };

  // TAB 0: Decisión
  const tabDecision = h("div", null,
    h("div", { style: S.secLabel }, "Precios de hoy"),
    h("div", { style: S.grid2 },
      h(NumInput, { label:"🌾 Soja BCR Rosario", value:v.soja_hoy,   onChange:set("soja_hoy"),   unit:"$/tn · precio pizarra",   step:1000 }),
      h(NumInput, { label:"💵 Dólar MEP",         value:v.dolar_hoy,  onChange:set("dolar_hoy"),  unit:"$/USD  (CCL ~$1.520)",    step:10   })
    ),
    h("div", { style: S.secLabel }, "Promedios de referencia (últimos 3 meses)"),
    h("div", { style: S.grid2 },
      h(NumInput, { label:"Soja promedio",  value:v.soja_prom,  onChange:set("soja_prom"),  unit:"$/tn",  step:1000 }),
      h(NumInput, { label:"Dólar promedio", value:v.dolar_prom, onChange:set("dolar_prom"), unit:"$/USD", step:10   })
    ),
    // Verdict card
    h("div", { style: { background:vc.bg, border:`1.5px solid ${vc.border}`, borderRadius:14, padding:"22px 18px", margin:"16px 0", textAlign:"center" } },
      h("div", { style: { fontSize:42, marginBottom:8 } }, verdict.emoji),
      h("div", { style: { fontSize:24, fontWeight:900, color:vc.title, letterSpacing:"-0.02em", marginBottom:6 } }, verdict.title),
      h("div", { style: { fontSize:14, color:"#5a6888", lineHeight:1.5 } }, verdict.sub)
    ),
    // Metrics
    h("div", { style: { display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:12 } },
      ...[
        { val:PCT(soja_rel),  lbl:"Soja vs prom.",  col: soja_rel  >= 0 ? "#22c55e" : "#ef4444" },
        { val:PCT(dolar_rel), lbl:"Dólar vs prom.", col: dolar_rel >= 0 ? "#22c55e" : "#ef4444" },
        { val:(score>0?"+":"")+score.toFixed(2), lbl:"Score", col: score>0.3?"#22c55e":score<-0.3?"#eab308":"#7a9fff" },
      ].map((m,i) =>
        h("div", { key:i, style: { ...S.card, textAlign:"center" } },
          h("div", { style: { fontSize:18, fontWeight:800, color:m.col, marginBottom:4 } }, m.val),
          h("div", { style: { fontSize:11, textTransform:"uppercase", letterSpacing:"0.06em", color:"#2e3650" } }, m.lbl)
        )
      )
    ),
    // Gauge
    h("div", { style: { ...S.card, marginBottom:12 } },
      h("div", { style: { display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:10 } },
        h("span", { style: { color:"#22c55e" } }, "🌾 Vender soja"),
        h("span", { style: { color:"#2e3650", fontSize:11 } }, "presión de la decisión"),
        h("span", { style: { color:"#eab308" } }, "💵 Vender dólares")
      ),
      h("div", { style: { height:14, background:"#0c0e14", borderRadius:7, position:"relative", overflow:"hidden" } },
        h("div", { style: { position:"absolute", left:0, top:0, height:"100%", width:pct+"%", background:"#22c55e", transition:"width 0.4s" } }),
        h("div", { style: { position:"absolute", right:0, top:0, height:"100%", width:(100-pct)+"%", background:"#eab308", transition:"width 0.4s" } })
      )
    ),
    // Razones
    h("div", { style: { ...S.card, marginBottom:16 } },
      h("div", { style: { fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", color:"#3a4460", marginBottom:10 } }, "📌 Por qué esta recomendación"),
      razones.length === 0
        ? h("div", { style: { fontSize:14, color:"#2e3650" } }, "Precios dentro del rango normal, sin señal clara.")
        : razones.map((r,i) =>
            h("div", { key:i, style: { fontSize:14, color:"#6a7898", lineHeight:1.7, padding:"8px 0", borderBottom: i<razones.length-1?"1px solid #1a1e2e":"none" } },
              r.e + " ",
              h("span", { style: { color:COLORS[r.c]||"#7a9fff", fontWeight:600 } }, r.t),
              " ",
              h("span", { style: { color:"#4a5568" } }, r.d)
            )
          )
    ),
    h("div", { style: { fontSize:12, color:"#2a3050", textAlign:"center", lineHeight:1.9 } },
      "Soja: ",
      h("a", { href:"https://www.cac.bcr.com.ar/es/precios-de-pizarra", target:"_blank", style:{ color:"#3b5bdb" } }, "Cámara Arbitral BCR"),
      " · Dólar: ",
      h("a", { href:"https://www.ambito.com/contenidos/dolar-mep.html", target:"_blank", style:{ color:"#3b5bdb" } }, "Ámbito MEP")
    )
  );

  // TAB 1: Mi situación
  const tabSituacion = h("div", null,
    h("div", { style: S.secLabel }, "Mi stock disponible"),
    h("div", { style: S.grid2 },
      h(Slider, { label:"Stock de dólares", value:v.stock_d, onChange:set("stock_d"), hint:"1 = pocos · 5 = tengo de sobra" }),
      h(Slider, { label:"Stock de soja",    value:v.stock_s, onChange:set("stock_s"), hint:"1 = poca  · 5 = tengo mucha"    })
    ),
    h("div", { style: S.secLabel }, "Mi contexto"),
    h("div", { style: S.grid2 },
      h(Slider, { label:"Urgencia de pesos", value:v.urgencia, onChange:set("urgencia"), hint:"1 = tengo tiempo · 5 = ya necesito" }),
      h(Slider, { label:"Expectativa soja",  value:v.expect_s, onChange:set("expect_s"), hint:"1 = va a bajar   · 5 = va a subir"  })
    ),
    h("div", { style: S.secLabel }, "Cuánto necesito liquidar"),
    h("div", { style: S.grid2 },
      h(NumInput, { label:"Tn de soja a vender", value:v.tn_soja,   onChange:set("tn_soja"),   unit:"toneladas", step:10  }),
      h(NumInput, { label:"USD a vender",         value:v.usd_dolar, onChange:set("usd_dolar"), unit:"dólares",   step:500 })
    ),
    h("div", { style: { ...S.card, marginTop:10 } },
      h("div", { style: { fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", color:"#3a4460", marginBottom:12 } }, "💰 Equivalencia en pesos"),
      h("div", { style: S.grid2 },
        h("div", null,
          h("div", { style: { fontSize:12, color:"#3a4460", marginBottom:4 } }, "🌾 Si vendés soja"),
          h("div", { style: { fontSize:22, fontWeight:800, color:"#22c55e" } }, "$" + FMT(sojaPs)),
          h("div", { style: { fontSize:12, color:"#2e3650", marginTop:2 } }, v.tn_soja + " tn × $" + FMT(v.soja_hoy) + "/tn")
        ),
        h("div", null,
          h("div", { style: { fontSize:12, color:"#3a4460", marginBottom:4 } }, "💵 Si vendés dólares"),
          h("div", { style: { fontSize:22, fontWeight:800, color:"#eab308" } }, "$" + FMT(dolarPs)),
          h("div", { style: { fontSize:12, color:"#2e3650", marginTop:2 } }, FMT(v.usd_dolar) + " USD × $" + FMT(v.dolar_hoy))
        )
      ),
      h("div", { style: { marginTop:14, paddingTop:12, borderTop:"1px solid #1e2130", fontSize:13, color:"#4a5568" } },
        "Diferencia: ",
        h("span", { style: { color: sojaPs>dolarPs ? "#22c55e" : "#eab308", fontWeight:700 } }, "$" + FMT(Math.abs(sojaPs-dolarPs))),
        " más a favor de " + (sojaPs>dolarPs ? "vender soja" : "vender dólares")
      )
    )
  );

  // TAB 2: Historial
  const HIST_SUBS = ["📦 Ventas", "📈 Precios", "✏️ Registros"];

  const decisionColors = {
    soja:    { bg:"#0b1f11", col:"#22c55e", brd:"#22c55e", lbl:"🌾 Soja" },
    dolares: { bg:"#1a1600", col:"#eab308", brd:"#eab308", lbl:"💵 Dólares" },
    mixto:   { bg:"#0e1225", col:"#7a9fff", brd:"#3b5bdb", lbl:"⚖️ Mixto" },
  };

  const thStyle = { fontSize:11, textTransform:"uppercase", letterSpacing:"0.06em", color:"#2e3650", fontWeight:700, padding:"8px 10px", textAlign:"right", borderBottom:"1px solid #1e2130", whiteSpace:"nowrap" };
  const tdStyle = { padding:"10px 10px", color:"#8a9ab8", borderBottom:"1px solid #141722", textAlign:"right", fontSize:14 };
  const tdName  = { padding:"10px 10px", color:"#c4cfe8", borderBottom:"1px solid #141722", fontSize:14, fontWeight:600 };

  // Datos de la API (o cargando)
  const ventas   = apiData ? apiData.ventas.filter(r => r.nombre !== "TOTAL") : [];
  const totalRow = apiData ? apiData.ventas.find(r => r.nombre === "TOTAL") : null;
  const precios  = apiData ? apiData.precios : [];
  const precioActual = precios.length ? precios[precios.length - 1].soja : 465000;
  const mesActual    = precios.length ? precios[precios.length - 1].mes  : "";
  const totalVendido = totalRow ? totalRow.ventas.reduce((a,b) => a+b, 0) : 0;
  const totalResto   = totalRow ? totalRow.resto : 0;

  const loadingEl = h("div", { style: { textAlign:"center", color:"#3a4460", padding:32, fontSize:13 } }, "Cargando datos de la planilla...");
  const errorEl   = h("div", { style: { textAlign:"center", color:"#ef4444", padding:32, fontSize:13 } }, apiErr);

  // Sub-tab: Ventas por socio
  const subVentas = apiLoad ? loadingEl : apiErr ? errorEl : h("div", null,
    h("div", { style: { fontSize:10, color:"#3a4460", marginBottom:10, lineHeight:1.6 } },
      "Campaña 2026-2027 · Stock inicial 12 tn/socio · Precio actual: $" + FMT(precioActual) + "/tn · Actualizado: " + (apiData ? new Date(apiData.actualizado).toLocaleDateString("es-AR") : "")
    ),
    h("div", { style: { overflowX:"auto" } },
      h("table", { style: { width:"100%", borderCollapse:"collapse" } },
        h("thead", null,
          h("tr", null,
            h("th", { style: { ...thStyle, textAlign:"left" } }, "Socio"),
            h("th", { style: thStyle }, "Stock"),
            ...MESES_CAMP.map((m,i) => h("th", { key:i, style: thStyle }, m)),
            h("th", { style: { ...thStyle, color:"#7a9fff" } }, "Resto")
          )
        ),
        h("tbody", null,
          ...ventas.map((r, ri) =>
            h("tr", { key:ri },
              h("td", { style: tdName }, r.nombre),
              h("td", { style: tdStyle }, r.stock),
              ...r.ventas.map((v2, mi) =>
                h("td", { key:mi, style: { ...tdStyle, color: v2 > 0 ? "#22c55e" : "#2e3650" } }, v2 > 0 ? v2 : "—")
              ),
              h("td", { style: { ...tdStyle, color:"#7a9fff", fontWeight:700 } }, r.resto)
            )
          ),
          totalRow && h("tr", null,
            h("td", { style: { ...tdName, color:"#e8edf5", borderTop:"1px solid #3a4460" } }, "TOTAL"),
            h("td", { style: { ...tdStyle, fontWeight:700, color:"#e8edf5", borderTop:"1px solid #3a4460" } }, totalRow.stock),
            ...totalRow.ventas.map((v2, mi) =>
              h("td", { key:mi, style: { ...tdStyle, fontWeight:700, color: v2 > 0 ? "#22c55e" : "#2e3650", borderTop:"1px solid #3a4460" } }, v2 > 0 ? v2 : "—")
            ),
            h("td", { style: { ...tdStyle, fontWeight:700, color:"#7a9fff", borderTop:"1px solid #3a4460" } }, totalRow.resto)
          )
        )
      )
    ),
    totalRow && h("div", { style: { marginTop:12, padding:"10px 12px", background:"#0b1f11", border:"1px solid #1e3322", borderRadius:8, fontSize:11, color:"#4a7a5a" } },
      "🌾 Total vendido: ",
      h("span", { style: { color:"#22c55e", fontWeight:700 } }, totalVendido + " tn"),
      "  ·  Facturación: ",
      h("span", { style: { color:"#22c55e", fontWeight:700 } }, "$" + FMT(totalVendido * precioActual)),
      "  ·  Resto campaña: ",
      h("span", { style: { color:"#7a9fff", fontWeight:700 } }, totalResto + " tn")
    )
  );

  // Sub-tab: Precios históricos
  const sojaSerie = precios.map(p => ({ fecha: mesToFecha(p.mes), valor: p.soja })).filter(p => p.fecha);
  const dolarSerie = (dolarDiario && dolarDiario.length)
    ? dolarDiario
    : precios.map(p => ({ fecha: mesToFecha(p.mes), valor: p.dolar })).filter(p => p.fecha);
  const subPrecios = apiLoad ? loadingEl : apiErr ? errorEl : h("div", null,
    h("div", { style: { ...S.card, marginBottom:14 } },
      h("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:10 } },
        h("div", { style: { fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", color:"#3a4460" } }, "📈 Evolución"),
        h("div", { style: { fontSize:10, color:"#2e3650" } }, (dolarDiario && dolarDiario.length) ? "Dólar diario en vivo · soja de la planilla" : "Soja y dólar de la planilla")
      ),
      h(Chart, { dolar: dolarSerie, soja: sojaSerie })
    ),
    h("div", { style: { overflowX:"auto" } },
      h("table", { style: { width:"100%", borderCollapse:"collapse" } },
        h("thead", null,
          h("tr", null,
            ...["Mes", "Dólar MEP", "Soja $/tn"].map((lbl,i) =>
              h("th", { key:i, style: { ...thStyle, textAlign: i===0 ? "left" : "right" } }, lbl)
            )
          )
        ),
        h("tbody", null,
          ...[...precios].reverse().map((row, ri) => {
            const isActual = row.mes === mesActual;
            return h("tr", { key:ri, style: isActual ? { background:"#0e1a0e" } : {} },
              h("td", { style: { ...tdName, color: isActual ? "#22c55e" : "#8a9ab8" } }, row.mes + (isActual ? " ◀" : "")),
              h("td", { style: { ...tdStyle, color: isActual ? "#eab308" : "#8a9ab8" } }, "$" + FMT(row.dolar)),
              h("td", { style: { ...tdStyle, color: isActual ? "#22c55e" : "#8a9ab8" } }, "$" + FMT(row.soja))
            );
          })
        )
      )
    )
  );

  // Sub-tab: Registros manuales
  const subRegistros = h("div", null,
    h("div", { style: { ...S.grid2, marginBottom:8 } },
      ...[
        { lbl:"Mes", key:"mes", type:"text", placeholder:"Jun 2026" },
        { lbl:"Soja $/tn", key:"soja", type:"number" },
        { lbl:"Dólar $/USD", key:"dolar", type:"number" },
      ].map(f =>
        h("div", { key:f.key, style: S.card },
          h("div", { style: { fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", color:"#3a4460", marginBottom:5 } }, f.lbl),
          h("input", { type:f.type||"text", value:hForm[f.key], placeholder:f.placeholder||"",
            onChange: e => setHForm(p => ({ ...p, [f.key]: e.target.value })),
            style: { width:"100%", background:"transparent", border:"none", outline:"none", color:"#e8edf5", fontSize:15, fontWeight:600, fontFamily:"inherit" } })
        )
      ),
      h("div", { style: S.card },
        h("div", { style: { fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", color:"#3a4460", marginBottom:5 } }, "Decisión"),
        h("select", { value:hForm.decision, onChange: e => setHForm(p => ({ ...p, decision: e.target.value })),
          style: { background:"transparent", border:"none", outline:"none", color:"#e8edf5", fontSize:13, fontWeight:600, fontFamily:"inherit", width:"100%", cursor:"pointer" } },
          h("option", { value:"soja" }, "🌾 Soja"),
          h("option", { value:"dolares" }, "💵 Dólares"),
          h("option", { value:"mixto" }, "⚖️ Mixto")
        )
      )
    ),
    h("button", {
      onClick: () => {
        if (!hForm.mes || !hForm.soja || !hForm.dolar) return;
        saveHist([...hist, { ...hForm, fecha: Date.now() }]);
        setHForm({ mes:"", soja:"", dolar:"", decision:"soja" });
      },
      style: { width:"100%", padding:10, background:"#3b5bdb", border:"none", borderRadius:9, color:"white", fontSize:13, fontWeight:700, cursor:"pointer", marginBottom:14 }
    }, "+ Agregar registro"),
    hist.length === 0
      ? h("div", { style: { textAlign:"center", color:"#2e3650", fontSize:12, padding:"28px 16px", border:"1px dashed #1e2130", borderRadius:9 } },
          "Sin registros todavía."
        )
      : h("div", { style: { overflowX:"auto" } },
          h("table", { style: { width:"100%", borderCollapse:"collapse", fontSize:12 } },
            h("thead", null,
              h("tr", null,
                ...["Mes","Soja","Dólar","Decisión",""].map((lbl,i) =>
                  h("th", { key:i, style: { ...thStyle, textAlign: i===0?"left":"right" } }, lbl)
                )
              )
            ),
            h("tbody", null,
              ...[...hist].reverse().map((row, ri) => {
                const realIdx = hist.length - 1 - ri;
                const bc = decisionColors[row.decision] || decisionColors.mixto;
                return h("tr", { key:ri },
                  h("td", { style: { padding:"8px", color:"#8a9ab8", borderBottom:"1px solid #141722" } }, row.mes),
                  h("td", { style: tdStyle }, "$" + FMT(row.soja)),
                  h("td", { style: tdStyle }, "$" + FMT(row.dolar)),
                  h("td", { style: { padding:"8px", borderBottom:"1px solid #141722" } },
                    h("span", { style: { display:"inline-block", padding:"2px 7px", borderRadius:4, fontSize:10, fontWeight:700, background:bc.bg, color:bc.col, border:`1px solid ${bc.brd}` } }, bc.lbl)
                  ),
                  h("td", { style: { padding:"8px", borderBottom:"1px solid #141722" } },
                    h("button", { onClick: () => saveHist(hist.filter((_,i) => i !== realIdx)),
                      style: { background:"none", border:"none", color:"#2e3650", cursor:"pointer", fontSize:14 } }, "✕")
                  )
                );
              })
            )
          )
        )
  );

  const tabHistorial = h("div", null,
    // Sub-tabs
    h("div", { style: { display:"flex", gap:8, marginBottom:16 } },
      ...HIST_SUBS.map((t,i) =>
        h("button", { key:i, onClick: () => setHistSub(i),
          style: { flex:1, padding:"12px 4px", borderRadius:10, border:`1.5px solid ${histSub===i?"#22c55e":"#1e2130"}`, background:histSub===i?"#0b1f11":"#141722", color:histSub===i?"#22c55e":"#4a5568", fontSize:13, fontWeight:700, cursor:"pointer" } },
          t
        )
      )
    ),
    histSub === 0 ? subVentas : histSub === 1 ? subPrecios : subRegistros
  );

  return h("div", { style: S.page },
    // Header
    h("div", { style: { display:"flex", alignItems:"center", gap:12, marginBottom:20 } },
      h("span", { style: { fontSize:34 } }, "🌾"),
      h("div", null,
        h("div", { style: { fontSize:18, fontWeight:800, color:"#e8edf5", letterSpacing:"-0.01em" } }, "SOJA vs DÓLAR"),
        h("div", { style: { fontSize:12, color:"#2e3650", marginTop:2 } }, "Pizarra BCR Rosario · MEP/CCL · Decisión mensual")
      )
    ),
    // Tabs
    h("div", { style: { display:"flex", gap:8, marginBottom:18 } },
      ...TABS.map((t,i) =>
        h("button", { key:i, onClick: () => setTab(i),
          style: { flex:1, padding:"13px 4px", borderRadius:12, border:`1.5px solid ${tab===i?"#3b5bdb":"#1e2130"}`, background:tab===i?"#1a2040":"#141722", color:tab===i?"#7a9fff":"#4a5568", fontSize:13, fontWeight:700, cursor:"pointer", lineHeight:1.3 } },
          t
        )
      )
    ),
    tab === 0 ? tabDecision : tab === 1 ? tabHistorial : tabSituacion
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App, null));
</script>
</body>
</html>
